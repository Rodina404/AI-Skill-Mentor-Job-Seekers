apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-skill-mentor-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"   # allow large resume uploads
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # All /api traffic goes to the Express backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: express-backend-service
                port:
                  number: 5000
          # Everything else goes to the React frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
