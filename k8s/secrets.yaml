# ⚠️  DO NOT commit real values to git.
# Fill in the base64-encoded values and apply with:
#   kubectl apply -f secrets.yaml
#
# To base64-encode a value:
#   echo -n "your-value-here" | base64

apiVersion: v1
kind: Secret
metadata:
  name: ai-skill-mentor-secrets
  namespace: default
type: Opaque
data:
  # Supabase — get from: supabase.com → project → Settings → API
  # echo -n "https://xyz.supabase.co" | base64
  SUPABASE_URL: <base64-encoded-supabase-url>

  # echo -n "your-anon-key" | base64
  SUPABASE_ANON_KEY: <base64-encoded-anon-key>

  # echo -n "your-service-role-key" | base64
  SUPABASE_SERVICE_KEY: <base64-encoded-service-key>

  # OpenAI key (used by m1_extraction and m5_roadmap)
  # echo -n "sk-..." | base64
  OPENAI_API_KEY: <base64-encoded-openai-key>

  # Anthropic key (used by m5_roadmap if using Claude)
  # echo -n "sk-ant-..." | base64
  ANTHROPIC_API_KEY: <base64-encoded-anthropic-key>
