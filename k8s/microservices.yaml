# ============================================================
# skill-normalization-service  (port 8002)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skill-normalization-deployment
  labels:
    app: skill-normalization
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skill-normalization
  template:
    metadata:
      labels:
        app: skill-normalization
    spec:
      containers:
        - name: skill-normalization
          image: ai-skill-mentor/skill-normalization:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
          resources:
            requests:
              memory: "1Gi"    # sentence-transformers needs more RAM
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 30   # model loading takes time
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: skill-normalization-service
spec:
  selector:
    app: skill-normalization
  ports:
    - port: 8002
      targetPort: 8002
  type: ClusterIP

