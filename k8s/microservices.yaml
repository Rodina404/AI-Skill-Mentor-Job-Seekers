# ============================================================
# m1-extraction-service  (port 8001)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: m1-extraction-deployment
  labels:
    app: m1-extraction
spec:
  replicas: 1
  selector:
    matchLabels:
      app: m1-extraction
  template:
    metadata:
      labels:
        app: m1-extraction
    spec:
      containers:
        - name: m1-extraction
          image: ai-skill-mentor/m1-extraction:latest
          imagePullPolicy: IfNotPresent   # use local image in Minikube
          ports:
            - containerPort: 8001
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-skill-mentor-secrets
                  key: OPENAI_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-skill-mentor-secrets
                  key: ANTHROPIC_API_KEY
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: m1-extraction-service
spec:
  selector:
    app: m1-extraction
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP

